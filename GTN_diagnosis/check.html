<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>診断ページ | 外国人雇用 成功確率診断 | GTN</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="check">

  <!-- ヘッダー -->
  <header class="site-header">
    <div class="header-inner">
      <a href="diagnosis.html" class="logo" aria-label="GTN Global Talent Navi">
        <span class="logo-mark">GTN</span>
        <span class="logo-name">Global Talent Navi</span>
      </a>
      <span class="header-badge">外国人雇用 成功確率診断</span>
    </div>
  </header>

  <!-- プログレスバー（sticky） -->
  <div class="progress-wrap" role="progressbar" aria-label="診断進捗">
    <div class="progress-inner">
      <div class="progress-meta">
        <span class="progress-label" id="progress-label">質問 1 / 10</span>
        <span class="progress-count" id="progress-count">0% 完了</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
      </div>
    </div>
  </div>

  <!-- メインコンテンツ -->
  <main>
    <div class="check-main">

      <!-- 案内テキスト -->
      <div class="check-intro-note" role="note">
        <span>💡</span>
        直感的に、最もあてはまる選択肢を1つ選んでください。正解・不正解はありません。
      </div>

      <!-- 質問カード -->
      <div class="question-card" id="question-card" role="form" aria-live="polite">
        <div class="q-label" id="q-label">Q1</div>
        <h2 class="q-text"  id="q-text">読み込み中...</h2>

        <!-- 選択肢（JavaScriptで描画） -->
        <div class="options" id="options-container" role="group" aria-labelledby="q-text">
        </div>

        <!-- ナビゲーション -->
        <div class="q-nav">
          <button class="btn-prev-q" id="btn-prev" disabled aria-label="前の質問に戻る">
            ← 前の質問に戻る
          </button>
          <button class="btn-next-q" id="btn-next" disabled aria-label="次の質問へ進む">
            次の質問へ →
          </button>
        </div>
      </div>

    </div>
  </main>

  <!-- フッター -->
  <footer class="site-footer">
    <div class="footer-links">
      <a href="https://globaltalent-navi.com/privacy" target="_blank" rel="noopener noreferrer">プライバシーポリシー</a>
      <a href="terms.html">利用規約</a>
      <a href="https://www.flair-staff.co.jp/" target="_blank" rel="noopener noreferrer">運営会社</a>
      <a href="https://globaltalent-navi.com/contact" target="_blank" rel="noopener noreferrer">お問い合わせ</a>
    </div>
    <p>© 2025 Global Talent Navi (GTN). All rights reserved.</p>
  </footer>

  <script src="js/app.js"></script>
  <script>
    // プログレス%表示をプログレスバーと同期
    const fillEl  = document.getElementById('progress-fill');
    const countEl = document.getElementById('progress-count');
    const obs = new MutationObserver(() => {
      countEl.textContent = fillEl.style.width + ' 完了';
    });
    obs.observe(fillEl, { attributes: true, attributeFilter: ['style'] });
  </script>
</body>
</html>
